<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @page { margin: 28.8pt; }
  body { font-size: 12pt; }
  .u { text-decoration: underline; }
  .s { text-decoration: line-through; }
  .both { text-decoration: underline line-through; }
</style>
</head>
<body>
  <h1>Text Decoration</h1>
  <p>Plain, <span class="u">underlined</span>, <span class="s">struck</span>,
     and <span class="both">both at once</span>.</p>
  <p>Tag forms: <u>u tag</u>, <ins>ins tag</ins>, <s>s tag</s>,
     <strike>strike tag</strike>, <del>del tag</del>.</p>
  <p class="u">A whole underlined paragraph so the decoration spans several
     wrapped lines continuously across the spaces between words.</p>
</body>
</html>
