<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @page { margin: 28.8pt; }
  body { font-size: 12pt; }
  .named { color: crimson; }
  .hex { color: #1a7f37; }
  .rgb { color: rgb(37, 99, 235); }
  .hsl { color: hsl(280, 60%, 45%); }
  .box { padding: 8pt; margin-bottom: 6pt; }
  .fill1 { background-color: #fff3cd; }
  .fill2 { background-color: rgb(209, 236, 241); }
  .fill3 { background: hsl(140, 40%, 90%); }
</style>
</head>
<body>
  <h1>Colors and Backgrounds</h1>
  <p class="named">Named color: crimson.</p>
  <p class="hex">Hex color: #1a7f37.</p>
  <p class="rgb">Functional rgb() color.</p>
  <p class="hsl">Functional hsl() color.</p>
  <div class="box fill1">Warning background block.</div>
  <div class="box fill2">Info background block.</div>
  <div class="box fill3">Success background block.</div>
</body>
</html>
