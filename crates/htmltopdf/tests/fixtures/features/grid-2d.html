<html><head><style>
  body { font-size: 12pt; }
  h3 { font-size: 13pt; margin: 10pt 0 4pt; }
  .g { display: grid; grid-template-columns: 100pt 100pt; column-gap: 10pt; row-gap: 8pt;
       grid-template-rows: 40pt 40pt; border: 1pt solid #999; }
  .c { background: #e8eef7; border: 1pt solid #66c; padding: 2pt 4pt; }

  /* grid-row: 1 / 3 spans both rows; the two auto cells flow down the right col. */
  .side { grid-row: 1 / 3; background: #f7e8e8; }

  /* An explicitly pinned cell; a later auto cell fills the earlier top-right gap. */
  .pinned { grid-row: 2; grid-column: 2; background: #e8f7e8; }

  /* A 2-row span whose content outgrows its rows grows the last spanned row. */
  .tall { grid-row: 1 / 3; background: #f7f0e8; }
</style></head><body>
<h3>Row span + auto flow</h3>
<div class="g">
  <div class="c side">Sidebar</div>
  <div class="c">Rowone</div>
  <div class="c">Rowtwo</div>
</div>

<h3>Explicit row/column pin</h3>
<div class="g">
  <div class="c">Firstcell</div>
  <div class="c pinned">Pincell</div>
  <div class="c">Thirdcell</div>
</div>

<h3>Span grows to fit content</h3>
<div class="g">
  <div class="c tall">Tall one two three four five six seven eight nine ten words</div>
  <div class="c">Rightup</div>
  <div class="c">Rightlow</div>
</div>
</body></html>
