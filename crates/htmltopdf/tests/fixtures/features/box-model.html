<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @page { margin: 28.8pt; }
  body { font-size: 11pt; }
  .card {
    margin: 10pt 0;
    padding: 12pt;
    border: 1pt solid #888;
    background-color: #fafafa;
  }
  .tight { padding: 2pt; margin: 4pt 0; border: 1pt solid #333; }
  .indent { margin-left: 24pt; }
</style>
</head>
<body>
  <h1>Box Model</h1>
  <div class="card">A bordered, padded card with a light background.</div>
  <div class="tight">A tight box with small padding and a darker border.</div>
  <div class="indent">
    <p>An indented block created with a left margin.</p>
  </div>
  <blockquote>A blockquote to exercise default nesting indentation.</blockquote>
</body>
</html>
