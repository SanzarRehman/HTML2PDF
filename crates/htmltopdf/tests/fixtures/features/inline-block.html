<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @page { margin: 28.8pt; }
  body { font-size: 12pt; line-height: 1.6; }
  .badge { display: inline-block; background-color: #d6453f; color: #fff;
           font-size: 9pt; padding: 2pt 6pt; border-radius: 4pt; font-weight: bold; }
  .btn { display: inline-block; background-color: #eef3fb; border: 1px solid #3d85c6;
         color: #1a4a7a; padding: 4pt 10pt; border-radius: 3pt; }
  .tag { display: inline-block; border: 1px solid #999; padding: 1pt 5pt; font-size: 10pt; }
  .swatch { display: inline-block; width: 30pt; height: 12pt; background-color: #6aa84f; }
</style>
</head>
<body>
  <h1>Inline block</h1>
  <p>Release status <span class="badge">NEW</span> is ready to ship today.</p>
  <p>Choose an action: <span class="btn">Approve</span> or <span class="btn">Reject</span> before noon.</p>
  <p>Topics <span class="tag">rust</span> <span class="tag">pdf</span> <span class="tag">layout</span>
     flow with the paragraph text and wrap onto the next line when the line runs out of room.</p>
  <p>A sized color swatch <span class="swatch"></span> sits on the text baseline.</p>
</body>
</html>
