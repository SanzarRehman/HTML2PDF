<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @page { margin: 28.8pt; }
  body { font-size: 12pt; }
</style>
</head>
<body>
  <h1>Lists</h1>
  <h2>Unordered</h2>
  <ul>
    <li>First bullet item</li>
    <li>Second bullet item</li>
    <li>Third bullet item with a longer line that should wrap onto a second
        visual line within the list item's content box.</li>
  </ul>
  <h2>Ordered</h2>
  <ol>
    <li>Step one</li>
    <li>Step two</li>
    <li>Step three</li>
  </ol>
  <h2>Nested</h2>
  <ul>
    <li>Parent
      <ul>
        <li>Child A</li>
        <li>Child B</li>
      </ul>
    </li>
  </ul>
</body>
</html>
