<!doctype html>
<html><head><meta charset="utf-8"><style>
  @page { margin: 36pt; }
  body { font-size: 11pt; }
  .hero {
    width: 500pt;
    height: 72pt;
    padding: 10pt;
    color: white;
    background: linear-gradient(to right, #0f766e 0%, #0e7490 55%, #1d4ed8 100%);
  }
  .diagonal {
    width: 280pt;
    height: 56pt;
    padding: 8pt;
    background-image: linear-gradient(135deg, #fef3c7, #fca5a5 48%, #c4b5fd);
  }
  table { margin-top: 16pt; }
  td { border: 1px solid #ffffff; padding: 8pt; }
  .cell { color: white; background: linear-gradient(to bottom, #7c3aed, #2563eb); }
</style></head><body>
  <div class="hero"><h1>Gradient report</h1><p>Three-stop horizontal print background.</p></div>
  <div class="diagonal">Diagonal gradient background image.</div>
  <table><tr><td class="cell">Gradient table cell</td><td>Solid neighbor</td></tr></table>
</body></html>
