<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @page { margin: 28.8pt; }
  body { font-size: 11pt; }
  .row { display: flex; gap: 12pt; margin-bottom: 14pt; }
  .card { background-color: #eef; padding: 8pt; border: 1px solid #99c; }
  .g1 { flex: 1; }
  .fixed { display: flex; gap: 8pt; margin-bottom: 14pt; }
  .w120 { flex: 0 0 120pt; background-color: #ffe08a; padding: 6pt; }
  .grow { flex: 1; background-color: #8fe; padding: 6pt; }
  .end { display: flex; justify-content: flex-end; gap: 8pt; }
  .chip { background-color: #dde; padding: 4pt 8pt; }
</style>
</head>
<body>
  <h1>Flexbox</h1>

  <h2>Equal columns (flex: 1)</h2>
  <div class="row">
    <div class="card g1">Column A</div>
    <div class="card g1">Column B</div>
    <div class="card g1">Column C</div>
  </div>

  <h2>Fixed basis + grow</h2>
  <div class="fixed">
    <div class="w120">Fixed 120pt</div>
    <div class="grow">Grows to fill the remaining space beside the fixed column.</div>
  </div>

  <h2>justify-content: flex-end</h2>
  <div class="end">
    <div class="chip">One</div>
    <div class="chip">Two</div>
  </div>
</body>
</html>
